version: 1
description: File-level contract for human-agent collaboration.

semantics:
  access_values:
    - allow
    - deny
    - require_discussion
  rule_precedence: more specific glob wins; if equal specificity, later rule wins

defaults:
  agent_read: allow
  agent_write: deny
  agent_execute: deny

required_paths:
  - AGENT_CHARTER.md
  - AGENTS.md
  - CLAUDE.md
  - docs/goal.txt
  - manifest.md
  - entrypoint/index.yaml
  - governance/file-contract.yaml
  - governance/trust-policy.yaml
  - runtime/capabilities.yaml
  - content/memory/changes.md

optional_paths:
  - skills/**
  - process/runs/**
  - process/decisions/**
  - process/tasks/**
  - content/**

rules:
  - glob: "AGENT_CHARTER.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Canonical cross-agent principles.

  - glob: "AGENTS.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Shared agent entrypoint and policy pointer.

  - glob: "CLAUDE.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Shared agent entrypoint and policy pointer.

  - glob: ".env*"
    required: false
    owner: human
    agent_read: deny
    agent_write: deny
    agent_execute: deny
    notes: Secret values are human-only.

  - glob: "docs/goal.txt"
    required: true
    owner: human
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Goal updates require explicit human discussion.

  - glob: "manifest.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Manifest controls canonical scope and packing boundaries.

  - glob: "entrypoint/**"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Entry points define human-agent interaction surfaces.

  - glob: "entrypoint/scripts/**"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: allow
    notes: Scripts are executable and therefore high impact.

  - glob: "governance/**"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Governance changes require explicit confirmation.

  - glob: "runtime/actors.yaml"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Actor identity and permissions are trust boundaries.

  - glob: "runtime/capabilities.yaml"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Runtime capability declarations are security boundaries.

  - glob: "runtime/server.py"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: allow
    notes: Runtime entrypoint is executable and must remain review-gated.

  - glob: "selfware*.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Protocol authority files should not be silently modified.

  - glob: "content/memory/changes.md"
    required: true
    owner: shared
    agent_read: allow
    agent_write: allow
    agent_execute: deny
    notes: Append-only change log for auditable writes.

  - glob: "content/**"
    required: false
    owner: human
    agent_read: allow
    agent_write: allow
    agent_execute: deny
    notes: Canonical data scope for user-approved runtime and agent writes.

  - glob: "skills/**"
    required: false
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: allow
    notes: Skills are reusable capability bundles.

  - glob: "process/tasks/**"
    required: false
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Task scope should be aligned with human intent.

  - glob: "process/decisions/**"
    required: false
    owner: shared
    agent_read: allow
    agent_write: require_discussion
    agent_execute: deny
    notes: Decisions are shared accountability artifacts.

  - glob: "process/runs/**"
    required: false
    owner: agent
    agent_read: allow
    agent_write: allow
    agent_execute: deny
    notes: Run logs are agent-generated and append-friendly.
